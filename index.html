<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Hunt</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <div id="custom-banner" class="banner hidden">
            <p id="banner-text">Message goes here</p>
        </div>

        <header>
            <h1>WORD HUNT</h1>
            <div class="stats">
                <span id="global-rank">GLOBAL RANK: 12</span>
                <span id="score">SCORE: 0</span>
            </div>
            <div class="level-info">
                <span id="current-phase">Phase 1: Base Word</span>
                <span id="potential-score" class="points-badge">Max: 20 pts</span>
            </div>
        </header>

        <main>
            <div class="visual-display">
                <div class="image-container">
                    <div id="word-image" class="clipart-placeholder">🐻</div>
                </div>
                <p id="turkish-hint" class="hint-text hidden">TİLKİ</p>
            </div>

            <div class="hint-controls">
                <button id="btn-turkish" class="btn-small">🇹🇷 Turkish</button>
                <button id="btn-listen" class="btn-small">🔊 Listen</button>
            </div>

            <p id="instruction-text" class="subtitle">Drag, tap, or type the letters:</p>
            
            <div class="target-slots" id="target-slots">
                </div>

            <div class="letter-bank" id="letter-bank">
                </div>

            <div class="virtual-keyboard hidden" id="virtual-keyboard">
                </div>

            <div class="controls">
                <button id="submit-btn" class="btn btn-submit">SUBMIT ✓</button>
                <button id="clear-btn" class="btn btn-clear">CLEAR 🗑️</button>
            </div>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
