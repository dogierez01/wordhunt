<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Word Builder Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="lobby-screen" class="container">
        <header>
            <h1>Word Lab: Select a Level</h1>
            <div class="score-board">Total Score: <span id="lobby-total-score">0</span></div>
        </header>
        <div id="lobby-grid">
            </div>
    </div>

    <div id="game-screen" class="container" style="display: none;">
        <header>
            <button id="btn-back" class="control-btn back-btn">⬅ Back to Lobby</button>
            <div class="score-board">Total Score: <span id="game-total-score">0</span></div>
        </header>

        <div class="hints-container">
            <button id="btn-pic" class="hint-btn">🖼️ Picture Hint (Max 18 pts)</button>
            <button id="btn-tr" class="hint-btn">🇹🇷 Turkish Hint (Max 16 pts)</button>
            <button id="btn-audio" class="hint-btn">🔊 Audio Hint (Max 14 pts)</button>
        </div>

        <div id="message-area" class="message-area"></div>

        <div id="target-slots" class="slots-container"></div>
        <div id="scrambled-letters" class="letters-container"></div>

        <div class="controls">
            <button id="btn-clear" class="control-btn clear">Clear</button>
            <button id="btn-submit" class="control-btn submit">Submit</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
